<style>
        body { font-family: 'Hanken Grotesk', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        }

            box-shadow: 0 0 30px rgba(109, 59, 215, 0.3);
        }

    body {

<body class="bg-on-background text-on-surface overflow-hidden h-screen flex flex-col">
<!-- Top AppBar (Injected from JSON & Modified for Overlay Context) -->
<header class="fixed top-0 w-full z-50 bg-transparent flex justify-between items-center px-container-padding h-16 w-full">
<button class="text-white hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[28px]">close</span>
</button>
<h1 class="font-headline-md text-headline-md text-white tracking-tight">VitalAI</h1>
<button class="text-white hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[28px]">flash_on</span>
</button>
</header>
<!-- Main Camera Viewport -->
<main class="relative flex-1 w-full bg-black overflow-hidden">
<!-- Viewfinder Background -->
<div class="absolute inset-0 z-0">

</div>
<!-- Scanning UI Overlay -->
<div class="absolute inset-0 z-10 flex flex-col items-center justify-center pointer-events-none">
<!-- Central Focus Area / AI Scan Animation -->
<div class="relative w-72 h-72 md:w-96 md:h-96">
<!-- Corner Brackets -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-tertiary-container rounded-tl-xl"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-tertiary-container rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-tertiary-container rounded-bl-xl"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-tertiary-container rounded-br-xl"></div>
<!-- Scanning Line -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-tertiary-container to-transparent animate-[pulse_2s_infinite]"></div>
<!-- Intelligence Markers -->
<div class="absolute top-1/4 left-1/4 flex items-center gap-2 px-3 py-1 bg-tertiary/20 backdrop-blur-md rounded-full border border-tertiary-container/30">
<span class="w-2 h-2 bg-tertiary-container rounded-full"></span>
<span class="text-white font-label-sm text-label-sm">Salmon detected</span>
</div>
<div class="absolute bottom-1/3 right-1/4 flex items-center gap-2 px-3 py-1 bg-tertiary/20 backdrop-blur-md rounded-full border border-tertiary-container/30">
<span class="w-2 h-2 bg-tertiary-container rounded-full"></span>
<span class="text-white font-label-sm text-label-sm">Fiber focus</span>
</div>
</div>
<!-- Focus Label -->
<p class="mt-8 text-white/80 font-label-md text-label-md bg-black/40 px-4 py-2 rounded-full backdrop-blur-sm">
                Center your meal for analysis
            </p>
</div>
<!-- Bottom Controls Layer -->
<div class="absolute bottom-0 left-0 w-full z-20 pb-xl px-container-padding flex flex-col gap-lg items-center bg-gradient-to-t from-black/80 to-transparent pt-xl">

<!-- Gallery Button -->

<div class="w-12 h-12 bg-surface-container-highest/20 backdrop-blur-md rounded-full flex items-center justify-center border border-white/20">
<span class="material-symbols-outlined">photo_library</span>
</div>
<span class="font-label-sm text-label-sm">Gallery</span>
</button>
<!-- Primary CTA: Scan Meal -->
<button class="relative group active:scale-95 transition-transform duration-200">
<div class="absolute inset-0 bg-gradient-to-br from-tertiary to-on-tertiary-fixed-variant rounded-full blur-md opacity-50 group-hover:opacity-100 transition-opacity"></div>
<div class="relative w-20 h-20 bg-white rounded-full flex items-center justify-center p-1 border-4 border-primary">
<div class="w-full h-full bg-gradient-to-br from-tertiary to-on-tertiary-fixed-variant rounded-full flex items-center justify-center text-white">
<span class="material-symbols-outlined text-[32px]" data-weight="fill">photo_camera</span>
</div>
</div>
</button>
<!-- Camera Flip -->
<button class="flex flex-col items-center gap-1 text-white hover:opacity-80 transition-all active:scale-90">
<div class="w-12 h-12 bg-surface-container-highest/20 backdrop-blur-md rounded-full flex items-center justify-center border border-white/20">
<span class="material-symbols-outlined">flip_camera_ios</span>
</div>
<span class="font-label-sm text-label-sm">Flip</span>
</button>
</div>
<!-- Action Description -->
<button class="w-full max-w-xs bg-primary py-4 px-6 rounded-xl flex items-center justify-center gap-3 shadow-lg active:scale-95 transition-transform">
<span class="text-white font-label-md text-label-md uppercase tracking-widest">Scan Meal</span>
<span class="material-symbols-outlined text-white">auto_awesome</span>
</button>
</div>
</main>
<!-- Navigation Shell (Contextual Filtering: Suppressed for Transactional/Focused UI) -->
<!-- Navigation omitted as per "Task-Focused/Transactional" suppression rule in instructions -->

<div class="fixed bottom-32 left-container-padding right-container-padding z-30 md:hidden">
<div class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-xl p-md flex items-center gap-md">
<div class="w-10 h-10 bg-primary/20 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary">lightbulb</span>
</div>
<div class="flex-1">
<p class="text-white font-label-md text-label-md">Tip: Good lighting helps AI accuracy.</p>
</div>
<button class="text-white/40">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</div>
