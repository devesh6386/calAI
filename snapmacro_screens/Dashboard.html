<span class="font-display-lg text-headline-md text-primary tracking-tight">VitalAI</span>
</div>

<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<main class="mt-20 px-container-padding space-y-lg">
<!-- Calorie & Macro Dashboard Bento Section -->
<section class="bg-surface-container-lowest rounded-[24px] p-md shadow-sm border border-surface-container">
<div class="flex flex-col items-center justify-center py-xl">

<div class="relative w-64 h-64 flex items-center justify-center">
<svg class="w-full h-full progress-ring-bg">
<circle class="text-primary/10" cx="128" cy="128" fill="transparent" r="116" stroke="currentColor" stroke-width="12"></circle>
<circle class="text-primary-container" cx="128" cy="128" fill="transparent" r="116" stroke="currentColor" stroke-dasharray="728" stroke-dashoffset="250" stroke-linecap="round" stroke-width="12"></circle>
</svg>
<div class="absolute flex flex-col items-center">
<span class="font-display-lg text-display-lg text-on-surface">1,420</span>
<span class="font-label-md text-on-surface-variant">/ 2,200 kcal</span>
</div>
</div>
<!-- Macro Rings Grid -->
<div class="grid grid-cols-3 gap-lg w-full mt-xl">
<div class="flex flex-col items-center gap-xs">
<div class="relative w-16 h-16">
<svg class="w-full h-full progress-ring-bg">
<circle class="text-primary/10" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-primary" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-dasharray="176" stroke-dashoffset="40" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<span class="absolute inset-0 flex items-center justify-center font-label-sm text-on-surface">75%</span>
</div>
<span class="font-label-md text-on-surface">Protein</span>
</div>
<div class="flex flex-col items-center gap-xs">
<div class="relative w-16 h-16">
<svg class="w-full h-full progress-ring-bg">
<circle class="text-secondary/10" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-secondary-container" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-dasharray="176" stroke-dashoffset="80" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<span class="absolute inset-0 flex items-center justify-center font-label-sm text-on-surface">50%</span>
</div>
<span class="font-label-md text-on-surface">Carbs</span>
</div>
<div class="flex flex-col items-center gap-xs">
<div class="relative w-16 h-16">
<svg class="w-full h-full progress-ring-bg">
<circle class="text-tertiary/10" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-tertiary-container" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-dasharray="176" stroke-dashoffset="120" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<span class="absolute inset-0 flex items-center justify-center font-label-sm text-on-surface">30%</span>
</div>
<span class="font-label-md text-on-surface">Fat</span>
</div>
</div>
</div>
</section>
<!-- Current Streak Card -->

<div class="space-y-1">
<p class="font-label-md text-white/80">Current Streak</p>
<h3 class="font-headline-md text-white">12 Days 🔥</h3>
</div>
<div class="bg-white/20 backdrop-blur-md rounded-xl px-3 py-1 text-white font-label-sm">
                    Keep it up!
                </div>
</div>
<!-- Decorative circle -->
<div class="absolute -right-8 -bottom-8 w-24 h-24 bg-white/10 rounded-full"></div>
</section>
<!-- Today's Meals Section -->

<div class="flex justify-between items-center">
<h2 class="font-headline-md text-on-surface">Today’s Meals</h2>
<button class="text-primary font-label-md">View All</button>
</div>
<div class="space-y-sm">
<!-- Breakfast Card -->
<div class="flex items-center justify-between bg-surface-container-lowest p-md rounded-[24px] shadow-sm border border-surface-container hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-xl bg-surface-container overflow-hidden">
<img alt="Breakfast" class="w-full h-full object-cover" data-alt="A top-down aesthetic food photography shot of a healthy acai bowl with fresh blueberries, sliced bananas, and granola on a clean white table. The lighting is soft and morning-like, emphasizing fresh textures and vibrant colors in a minimalist wellness style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC5piz2kNydbap1At8gOSL15Tqy0gLm1Svk8sLPlK_LjemSObG-qlTKke6uiF68Pi98oiyPmOWDPoxNDjGP98DMy8udF8CL_mPyH4us0FS1nhtb3CNeIpxGnawqYFob9aHmahtAqpGQuRnQ8clrLP2-kdB1iZSqsP6_zNJksPN_mHMkC8Ro4Vj00vH4QjGJHQ_Hnlt1dVbH-3-SECVkCOWP_7K1IoREuvCOhHxJJht8FVMxWI5nCxBy41GN3qRBFrXQ1PpWQV5fBOLT"/>
</div>
<div>
<p class="font-label-md text-on-surface">Avocado Toast &amp; Egg</p>
<p class="font-label-sm text-on-surface-variant">Breakfast • 8:30 AM</p>
</div>
</div>
<div class="text-right">
<p class="font-label-md text-on-surface">420 kcal</p>
<span class="material-symbols-outlined text-on-surface-variant text-sm">chevron_right</span>
</div>
</div>
<!-- Lunch Card -->
<div class="flex items-center justify-between bg-surface-container-lowest p-md rounded-[24px] shadow-sm border border-surface-container hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-xl bg-surface-container overflow-hidden">
<img alt="Lunch" class="w-full h-full object-cover" data-alt="A professional flat-lay photograph of a grilled chicken salad with quinoa, kale, and cherry tomatoes in a clean ceramic bowl. High-end lighting creates soft shadows and highlights the vibrant green and red ingredients, fitting a premium nutritional app aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzVwxN1jBQcAu2vRBn9K08xjAwYpaVt-cmz_te6Pln5Cg5AnvJpqy7wPzdoBtbQEPa6KX1GeYkDJewYuMOeg_HzansQ_Zq7UEoKg3yQCv68HkhW5iuFv1WXQIeWj1qnyd5EaCGgrtK-YWgJXhL7EvP4VLsYu-he0AMec7p7wnxhQLPP0_mOizWjns2ZEOL85HYlIXAewpAWRIjm9lnVJDRRvn4XqSmrv8F7IYgcq4ZKv33s1WvovCajykZMnl1MX1QdpxIRjQOQziV"/>
</div>
<div>
<p class="font-label-md text-on-surface">Quinoa Chicken Salad</p>
<p class="font-label-sm text-on-surface-variant">Lunch • 1:15 PM</p>
</div>
</div>
<div class="text-right">
<p class="font-label-md text-on-surface">680 kcal</p>
<span class="material-symbols-outlined text-on-surface-variant text-sm">chevron_right</span>
</div>
</div>
</div>
</section>
</main>
<!-- Floating Action Button -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 z-50">
<button class="bg-gradient-to-r from-tertiary to-tertiary-container w-16 h-16 rounded-full shadow-lg flex items-center justify-center text-white active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">photo_camera</span>

<span class="material-symbols-outlined">insights</span>
<span class="font-label-sm text-label-sm">Trends</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:bg-surface-container-high transition-colors active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</button>
</nav>
